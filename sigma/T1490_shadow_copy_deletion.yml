title: Volume Shadow Copy Deletion via vssadmin or wmic
id: f6a7b8c9-d0e1-2345-f012-345678901235
status: experimental
description: |
    Detects deletion of Volume Shadow Copies using vssadmin.exe or wmic, a standard
    pre-encryption step in ransomware kill chains that destroys Windows recovery
    points. Technique T1490 was NOT DETECTED during the ACC Hackathon live run —
    no Wazuh rule existed targeting vssadmin.exe with deletion arguments.
    This rule closes that gap.
references:
    - https://attack.mitre.org/techniques/T1490/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1490
author: Janus Team — ACC Hackathon 2026
date: 2026-06-12
tags:
    - attack.impact
    - attack.t1490
logsource:
    category: process_creation
    product: windows
detection:
    selection_vssadmin:
        Image|endswith: '\vssadmin.exe'
        CommandLine|contains|all:
            - 'delete'
            - 'shadows'
    selection_wmic:
        Image|endswith: '\wmic.exe'
        CommandLine|contains|all:
            - 'shadowcopy'
            - 'delete'
    selection_wbadmin:
        Image|endswith: '\wbadmin.exe'
        CommandLine|contains|all:
            - 'delete'
            - 'catalog'
    condition: selection_vssadmin or selection_wmic or selection_wbadmin
falsepositives:
    - Legitimate backup software that manages shadow copies
    - System administrators manually managing disk space
level: critical
fields:
    - ComputerName
    - User
    - Image
    - CommandLine
    - ParentImage
    - ParentCommandLine
