title: LSASS Memory Access for Credential Dumping
id: c3d4e5f6-a7b8-9012-cdef-012345678902
status: experimental
description: |
    Detects access to the LSASS process memory, which is used by tools like Mimikatz
    and ProcDump to extract NTLM password hashes. Technique T1003.001 was DETECTED
    during the ACC Hackathon live run via Wazuh alert: "Windows command prompt started
    by an abnormal process." This rule provides a more precise detection.
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.001
author: Janus Team — ACC Hackathon 2026
date: 2026-06-12
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_access
    product: windows
detection:
    selection_lsass:
        TargetImage|endswith: '\lsass.exe'
        GrantedAccess|contains:
            - '0x1010'
            - '0x1410'
            - '0x147a'
            - '0x1fffff'
    selection_tools:
        SourceImage|endswith:
            - '\procdump.exe'
            - '\procdump64.exe'
            - '\mimikatz.exe'
            - '\wce.exe'
            - '\pwdump.exe'
    condition: selection_lsass or selection_tools
falsepositives:
    - Antivirus software accessing LSASS for scanning purposes
    - Windows Defender Credential Guard in some configurations
level: critical
fields:
    - ComputerName
    - User
    - SourceImage
    - TargetImage
    - GrantedAccess
