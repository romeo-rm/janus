title: Remote System Discovery via net view and PowerShell
id: d6e7f8a9-b0c1-2345-3456-789012345678
status: experimental
description: |
    Detects remote host enumeration using net view and PowerShell commands that
    scan for reachable systems on the local network. Adversaries collect this
    data to select pivot targets for lateral movement.
    Technique T1018 — Remote System Discovery.
    ACC Hackathon 2026 — Final MVP expansion. Atomic Red Team Test 1.
references:
    - https://attack.mitre.org/techniques/T1018/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1018
    - https://github.com/mukul975/Anthropic-Cybersecurity-Skills/tree/main/skills/building-detection-rules-with-sigma
author: Janus Team — ACC Hackathon 2026
date: 2026-06-16
tags:
    - attack.discovery
    - attack.t1018
logsource:
    category: process_creation
    product: windows
detection:
    selection_net_view:
        EventID: 1
        Image|endswith:
            - '\net.exe'
            - '\net1.exe'
        CommandLine|contains: 'view'
    selection_ps_discovery:
        EventID: 1
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Test-Connection'
            - 'Get-ADComputer'
            - 'Resolve-DnsName'
            - '[System.Net.Dns]::GetHostAddresses'
    condition: selection_net_view or selection_ps_discovery
falsepositives:
    - Network administrators verifying share availability
    - Monitoring tools performing reachability checks
    - Domain management scripts enumerating computers via ADSI
level: medium
fields:
    - ComputerName
    - User
    - CommandLine
    - ParentImage
